<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>API Documentation</title>
  <!-- Cloudflare CDN Stylesheet -->
  <link rel="stylesheet" href="https://cloudflare.com" />
</head>
<body>
  <div id="swagger-ui"></div>

  <!-- Cloudflare CDN Javascript Libraries -->
  <script src="https://cloudflare.com"></script>
  <script src="https://cloudflare.com"></script>

  <script>
    window.onload = () => {
      window.ui = SwaggerUIBundle({
        url: 'openapi.yaml', // Change this to your exact filename if it's different
        dom_id: '#swagger-ui',
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        layout: "BaseLayout"
      });
    };
  </script>
</body>
</html>
